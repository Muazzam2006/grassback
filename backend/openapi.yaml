components:
  schemas:
    BonusDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        order_id:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        source_user:
          type: integer
          readOnly: true
        source_user_phone:
          type: string
          readOnly: true
          nullable: true
        level:
          type: integer
          readOnly: true
        bonus_type:
          allOf:
          - $ref: '#/components/schemas/BonusTypeEnum'
          readOnly: true
        calculation_type_snapshot:
          allOf:
          - $ref: '#/components/schemas/CalculationTypeSnapshotEnum'
          readOnly: true
          title: Calculation Type (Snapshot)
        applied_value_snapshot:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,4})?$
          readOnly: true
          nullable: true
          title: Applied Value (Snapshot)
          description: The rule value (% or flat) that produced this bonus amount.
        percent_snapshot:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
          description: Deprecated in v2. Use applied_value_snapshot instead.
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/BonusStatusEnum'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - amount
      - applied_value_snapshot
      - bonus_type
      - calculation_type_snapshot
      - created_at
      - id
      - level
      - order_id
      - percent_snapshot
      - source_user
      - source_user_phone
      - status
    BonusList:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        level:
          type: integer
          readOnly: true
        bonus_type:
          allOf:
          - $ref: '#/components/schemas/BonusTypeEnum'
          readOnly: true
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/BonusStatusEnum'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - amount
      - bonus_type
      - created_at
      - id
      - level
      - status
    BonusStatusEnum:
      enum:
      - PENDING
      - CONFIRMED
      type: string
      description: |-
        * `PENDING` - Pending
        * `CONFIRMED` - Confirmed
    BonusTypeEnum:
      enum:
